<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <base href="/arcade-kiosk-lite/">
  <title>Legends Arcade Admin</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <div class="admin-app" id="admin-app">
    <section class="admin-gate" id="admin-gate">
      <h1>Arcade Staff Admin</h1>
      <p class="admin-gate-lead">Enter staff PIN to review score photos.</p>
      <input type="password" id="admin-pin-input" class="admin-pin-input" maxlength="12" placeholder="PIN" autocomplete="off">
      <button type="button" class="admin-btn primary" id="admin-pin-btn">Unlock</button>
      <p class="admin-gate-error" id="admin-gate-error" style="display:none;"></p>
    </section>

    <section class="admin-panel is-hidden" id="admin-panel">
      <header class="admin-header">
        <h1>Pending Score Submissions</h1>
        <button type="button" class="admin-btn" id="admin-refresh-btn">Refresh</button>
      </header>
      <p class="admin-status" id="admin-status">Loading...</p>
      <ul class="admin-submission-list" id="admin-submission-list"></ul>
    </section>
  </div>

  <script src="submissions.js"></script>
  <script src="admin.js"></script>
</body>
</html>
