<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="mobile-web-app-capable" content="yes">
  <meta http-equiv="refresh" content="3600">
  <base href="/arcade-tv/">
  <title>Legends Arcade — TV Leaderboard</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Audiowide&amp;family=Bungee&amp;family=Roboto+Condensed:wght@400;700;900&amp;display=swap">
  <link rel="stylesheet" href="styles.css?v=20250690">
</head>
<body>
  <div id="tv-app" class="tv-app">
    <header class="tv-header">
      <span class="tv-header-games" id="tv-games-count">412 games</span>
      <div class="tv-header-center">
        <h1 class="tv-brand-title">Legends Arcade</h1>
        <p class="tv-header-tagline" id="tv-header-tagline" hidden>High Scores</p>
      </div>
      <div class="tv-status-block" id="tv-status" aria-live="polite">
        <span class="tv-online-indicator" id="tv-online-indicator" aria-hidden="true"></span>
        <span class="tv-status-label" id="tv-status-label">…</span>
      </div>
    </header>

    <main class="tv-stage" id="tv-stage" aria-live="polite">
      <div class="tv-slide is-active" id="tv-slide">
        <p class="tv-loading">Loading leaderboard...</p>
      </div>
    </main>

    <footer class="tv-footer">
      <div class="tv-dots" id="tv-dots" aria-hidden="true"></div>
      <p class="tv-footer-hint" id="tv-footer-hint">Scan your phone to submit scores</p>
    </footer>

    <a class="tv-corner-qr tv-corner-qr--left" href="https://frontrangepool.com/arcade-kiosk-lite" target="_blank" rel="noopener" aria-label="Scan for games — open arcade kiosk">
      <img src="scan-for-games-qr.png" alt="Scan for games" width="320" height="400">
    </a>
    <a class="tv-corner-qr tv-corner-qr--right" href="https://frontrangepool.com/arcade-kiosk-lite" target="_blank" rel="noopener" aria-label="Scan for games — open arcade kiosk">
      <img src="scan-for-games-qr.png" alt="Scan for games" width="320" height="400">
    </a>
  </div>

  <script src="../arcade-kiosk-lite/activity.js?v=20250629"></script>
  <script src="tv.js?v=20250690"></script>
</body>
</html>
